<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cambodian Gold Price — Damlung</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#111;
    color:#fff;
    text-align:center;
    padding:20px;
}

.card{
    background:#1c1c1c;
    padding:25px;
    border-radius:12px;
    max-width:600px;
    margin:auto;
    box-shadow:0 0 20px rgba(255,215,0,.25);
}

.price{
    font-size:40px;
    color:#FFD700;
    margin:10px 0;
}

small{color:#bbb;}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    padding:10px;
    border-bottom:1px solid #333;
}

th{color:#FFD700;}
</style>
</head>

<body>

<div class="card">

<h2>🇰🇭 Gold Price — 1 Damlung (37.5 g)</h2>

<div>Gold price per gram (USD)</div>
<div id="gramPrice" class="price">Loading...</div>

<div>Price per Damlung</div>
<div id="damlungPrice" class="price">--</div>

<small>Updates automatically</small>

<h3>📊 Last 30 Days History</h3>

<table id="historyTable">
<tr>
<th>Date</th>
<th>USD / Damlung</th>
</tr>
</table>

</div>

<script>

// ===== SETTINGS =====
const GRAMS_PER_DAMLUNG = 37.5;

// Public gold price API (no key required)
const API_URL =
"https://api.metals.live/v1/spot/gold";

// ===== FETCH LIVE PRICE =====
async function loadPrice() {
    try {

        const response = await fetch(API_URL);
        const data = await response.json();

        // API returns price per ounce
        const pricePerOunce = data[0].price;

        // Convert ounce → gram
        const pricePerGram = pricePerOunce / 31.1035;

        // Calculate damlung price
        const damlungPrice = pricePerGram * GRAMS_PER_DAMLUNG;

        document.getElementById("gramPrice")
            .textContent = "$" + pricePerGram.toFixed(2);

        document.getElementById("damlungPrice")
            .textContent = "$" + damlungPrice.toFixed(2);

        saveHistory(damlungPrice.toFixed(2));

    } catch (e) {
        document.getElementById("gramPrice")
            .textContent = "Error loading price";
    }
}

// ===== HISTORY STORAGE =====
function saveHistory(price) {

    const today = new Date().toLocaleDateString();

    let history =
        JSON.parse(localStorage.getItem("goldHistory") || "[]");

    // avoid duplicate same day entry
    if (history.length && history[0].date === today) return;

    history.unshift({date: today, price});

    // keep 30 days
    history = history.slice(0, 30);

    localStorage.setItem("goldHistory",
        JSON.stringify(history));

    renderHistory();
}

// ===== DISPLAY HISTORY =====
function renderHistory() {

    const history =
        JSON.parse(localStorage.getItem("goldHistory") || "[]");

    const table = document.getElementById("historyTable");

    // remove old rows
    table.innerHTML =
        "<tr><th>Date</th><th>USD / Damlung</th></tr>";

    history.forEach(item => {

        const row = table.insertRow();

        row.insertCell(0).textContent = item.date;
        row.insertCell(1).textContent = "$" + item.price;

    });
}

// ===== INIT =====
loadPrice();
renderHistory();

// Optional auto refresh every hour
setInterval(loadPrice, 3600000);

</script>

</body>
</html>
