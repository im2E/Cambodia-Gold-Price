<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cambodian Damlung Gold Price (Live)</title>
<style>
    body { font-family: Arial, sans-serif; margin: 40px; background: #fafafa; }
    h1 { margin-bottom: 5px; }
    #priceBox { padding: 20px; background: white; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 350px; }
    table { margin-top: 25px; border-collapse: collapse; width: 500px; background: white; }
    th, td { padding: 10px; border: 1px solid #ddd; text-align: center; }
    th { background: #f0f0f0; }
</style>
</head>
<body>

<h1>Cambodian Gold Price — 1 Damlung (37.5g)</h1>
<div id="priceBox">
    <div><strong>Live Price Per Gram:</strong> <span id="gramPrice">Loading...</span></div>
    <div><strong>1 Damlung (37.5g):</strong> <span id="damlungPrice">Loading...</span></div>
    <div style="margin-top:10px; font-size: 0.9em; color: #666;">
        Updated: <span id="updatedTime">Loading...</span>
    </div>
</div>

<h2>30‑Day Price History</h2>
<table>
    <thead>
        <tr>
            <th>Date</th>
            <th>Price per Gram (USD)</th>
            <th>Damlung Value (USD)</th>
        </tr>
    </thead>
    <tbody id="historyTable"></tbody>
</table>

<script>
// APMEX public JSON endpoint for gold spot price per gram
const API_URL = "https://www.apmex.com/api/spot/metal/gold";

async function fetchGoldPrice() {
    try {
        const response = await fetch(API_URL);
        const data = await response.json();

        // APMEX returns price per troy ounce; convert to grams
        const pricePerOunce = data.spot;
        const gramPrice = pricePerOunce / 31.1035;

        updateDisplay(gramPrice);
        updateHistory(gramPrice);

    } catch (err) {
        console.error("Error fetching gold price:", err);
        document.getElementById("gramPrice").innerText = "Error";
    }
}

function updateDisplay(gramPrice) {
    const damlungPrice = gramPrice * 37.5;

    document.getElementById("gramPrice").innerText = "$" + gramPrice.toFixed(2);
    document.getElementById("damlungPrice").innerText = "$" + damlungPrice.toFixed(2);
    document.getElementById("updatedTime").innerText = new Date().toLocaleString();
}

function updateHistory(gramPrice) {
    const today = new Date().toISOString().split("T")[0];
    const damlung = gramPrice * 37.5;

    let history = JSON.parse(localStorage.getItem("goldHistory") || "[]");

    // Prevent duplicate entries for the same day
    if (!history.find(entry => entry.date === today)) {
        history.unshift({
            date: today,
            gram: gramPrice,
            damlung: damlung
        });
    }

    // Keep only last 30 days
    history = history.slice(0, 30);

    localStorage.setItem("goldHistory", JSON.stringify(history));
    renderHistory(history);
}

function renderHistory(history) {
    const table = document.getElementById("historyTable");
    table.innerHTML = "";

    history.forEach(row => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${row.date}</td>
            <td>$${row.gram.toFixed(2)}</td>
            <td>$${row.damlung.toFixed(2)}</td>
        `;
        table.appendChild(tr);
    });
}

// Run on load
fetchGoldPrice();

// Auto-update once per day
setInterval(fetchGoldPrice, 24 * 60 * 60 * 1000);
</script>

</body>
</html>
