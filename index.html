<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Price - Cambodian Damlung</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 50vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .container {
        background: white;
        border-radius: 20px;
        padding: 10px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 500px;
        width: 100%;
    }

    h1 {
        color: #333;
        text-align: center;
        margin-bottom: 30px;
        font-size: 28px;
    }

    .gold-icon {
        text-align: center;
        font-size: 70px;
        margin-bottom: 1px;
    }

    .price-card {
        background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
        border-radius: 15px;
        padding: 25px;
        margin-bottom: 20px;
        text-align: center;
    }

    .price-label {
        color: #333;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 10px;
        letter-spacing: 1px;
    }

    .price-value {
        color: #fff;
        font-size: 36px;
        font-weight: bold;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
    }

    .info-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin-top: 20px;
    }

    .info-box {
        background: #f8f9fa;
        border-radius: 10px;
        padding: 15px;
        text-align: center;
    }

    .info-label {
        color: #667;
        font-size: 12px;
        margin-bottom: 5px;
    }

    .info-value {
        color: #333;
        font-size: 18px;
        font-weight: bold;
    }

    .loading {
        text-align: center;
        color: #667;
        font-style: italic;
    }

    .error {
        background: #fee;
        color: #c33;
        padding: 15px;
        border-radius: 10px;
        text-align: center;
    }

    .refresh-btn {
        width: 100%;
        padding: 12px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 20px;
        transition: background 0.3s;
    }

    .refresh-btn:hover {
        background: #5568d3;
    }

    .timestamp {
        text-align: center;
        color: #999;
        font-size: 12px;
        margin-top: 15px;
    }
</style>

</head>
<body>
    <div class="container">
        <div class="gold-icon">ð°ð­</div>
        <h1>Gold Price <span id="today-date"></span></h1>
<script>
    const today = new Date();
    const formattedDate =
        String(today.getMonth() + 1).padStart(2, '0') + '/' +
        String(today.getDate()).padStart(2, '0') + '/' +
        today.getFullYear();

    document.getElementById('today-date').textContent = formattedDate;
</script>
        <div id="content">
            <p class="loading">Loading gold prices...</p>
        </div>
    </div>

<script>
async function fetchGoldPrice() {
    const contentDiv = document.getElementById('content');

    try {
        const response = await fetch('https://api.gold-api.com/price/XAU');
        if (!response.ok) throw new Error('Failed to fetch gold price');

        const data = await response.json();
        const pricePerOunce = data.price;

        const pricePerGram = pricePerOunce / 31.1035;
        const pricePerChi = pricePerGram * 3.75;
        const pricePerDamlung = pricePerGram * 37.5;

        // Store globally for calculator
        window.goldPrices = {
            ounce: pricePerOunce,
            gram: pricePerGram,
            chi: pricePerChi,
            damlung: pricePerDamlung
        };

        contentDiv.innerHTML = `
            <div class="price-card">
                <div class="price-label">1 DAMLUNG (37.5g)</div>
                <div class="price-value">$${pricePerDamlung.toFixed(2)}</div>
            </div>

            <div class="info-grid">
                <div class="info-box">
                    <div class="info-label">Per Ounce</div>
                    <div class="info-value">$${pricePerOunce.toFixed(2)}</div>
                </div>
                <div class="info-box">
                    <div class="info-label">Per Gram</div>
                    <div class="info-value">$${pricePerGram.toFixed(2)}</div>
                </div>
            </div>

            <div class="info-grid">
                <div class="info-box">
                    <div class="info-label">Per Chi</div>
                    <div class="info-value">$${pricePerChi.toFixed(2)}</div>
                </div>

                <!-- 🔥 NEW CALCULATOR -->
                <div class="info-box">
                    <div class="info-label">Price Calculator</div>

                    <input id="amountInput" type="number" step="any"
                        placeholder="Enter amount"
                        style="width:100%; padding:8px; margin-bottom:8px;
                        border-radius:6px; border:1px solid #ccc;">

                    <select id="unitSelect"
                        style="width:100%; padding:8px; margin-bottom:8px;
                        border-radius:6px;">
                        <option value="ounce">Ounce</option>
                        <option value="gram">Gram</option>
                        <option value="chi">Chi</option>
                        <option value="damlung">Damlung</option>
                    </select>

                    <div id="calcResults"
                        style="font-size:14px; line-height:1.6;"></div>
                </div>
            </div>

            <button class="refresh-btn" onclick="fetchGoldPrice()">🔄 Refresh Price</button>

            <div class="timestamp">
                Last updated: ${new Date().toLocaleString()}
            </div>
        `;

        attachCalculatorEvents();

    } catch (error) {
        contentDiv.innerHTML = `
            <div class="error">
                ⚠️ Error fetching gold price: ${error.message}
                <br><br>
                Please check your internet connection or try again later.
            </div>
            <button class="refresh-btn" onclick="fetchGoldPrice()">🔄 Try Again</button>
        `;
    }
}

function attachCalculatorEvents() {
    const amountInput = document.getElementById('amountInput');
    const unitSelect = document.getElementById('unitSelect');

    amountInput.addEventListener('input', updateCalculator);
    unitSelect.addEventListener('change', updateCalculator);
}

function updateCalculator() {
    const amount = parseFloat(document.getElementById('amountInput').value);
    const unit = document.getElementById('unitSelect').value;
    const resultsDiv = document.getElementById('calcResults');

    if (!amount || amount <= 0 || !window.goldPrices) {
        resultsDiv.innerHTML = "";
        return;
    }

    let grams;

    switch (unit) {
        case "ounce":
            grams = amount * 31.1035;
            break;
        case "gram":
            grams = amount;
            break;
        case "chi":
            grams = amount * 3.75;
            break;
        case "damlung":
            grams = amount * 37.5;
            break;
    }

    const prices = window.goldPrices;

    const totalOunce = grams / 31.1035;
    const totalChi = grams / 3.75;
    const totalDamlung = grams / 37.5;

    const totalPrice = grams * prices.gram;

    resultsDiv.innerHTML = `
        💰 Price: <b>$${totalPrice.toFixed(2)}</b><br>
        Ounce: ${totalOunce.toFixed(4)} oz<br>
        Gram: ${grams.toFixed(2)} g<br>
        Chi: ${totalChi.toFixed(2)}<br>
        Damlung: ${totalDamlung.toFixed(2)}
    `;
}

// Initial load
fetchGoldPrice();

// Auto-refresh every 10 seconds
setInterval(fetchGoldPrice, 10000);
</script>

</body>
</html>
