<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Price</title>
</head>
<body>
    <h1>Current Gold Price</h1>
    <div id="price"></div>
    <script>
        const GOLD_API_URL = 'https://metals-api.com/api/latest'; // Open API endpoint from metals-api.com
        fetch(GOLD_API_URL + '?access_key=YOUR_ACCESS_KEY&base=USD&symbols=XAU')
            .then(response => response.json())
            .then(data => {
                const price = data.rates.XAU;
                document.getElementById('price').innerText = `Gold Price: $${price}`;
            })
            .catch(error => {
                console.error('Error fetching the gold price:', error);
            });
    </script>
</body>
</html>
