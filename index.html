<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cambodian Gold Price (Damlung)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #fff;
    padding: 20px;
    text-align: center;
  }

  h1 { color: gold; }

  .card {
    background: #111827;
    padding: 20px;
    border-radius: 12px;
    margin: 20px auto;
    max-width: 500px;
    box-shadow: 0 0 20px rgba(255,215,0,0.2);
  }

  .price {
    font-size: 2em;
    color: #ffd700;
    margin: 10px 0;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
  }

  th, td {
    padding: 8px;
    border-bottom: 1px solid #333;
  }

  th { background: #1f2937; }
</style>
</head>

<body>

<h1>🇰🇭 Cambodian Gold Price</h1>

<div class="card">
  <h2>Live Price</h2>

  <div>Gold Price per Gram (USD)</div>
  <div id="gramPrice" class="price">Loading...</div>

  <div>Price per Damlung (37.5 g)</div>
  <div id="damlungPrice" class="price">Loading...</div>

  <small>Updates daily • Based on live global gold price</small>
</div>

<div class="card">
  <h2>📅 30-Day Price History</h2>
  <table id="historyTable">
    <thead>
      <tr>
        <th>Date</th>
        <th>Gram (USD)</th>
        <th>Damlung (USD)</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
const DAMLUNG_GRAMS = 37.5;
const STORAGE_KEY = "goldHistory";

// -------- FETCH LIVE GOLD PRICE --------
// Using gold price API (spot price per gram)
async function fetchGoldPrice() {
  try {
    const res = await fetch("https://api.metals.live/v1/spot/gold");
    const data = await res.json();

    // API returns price per troy ounce
    const pricePerOunce = data[0].price;
    const pricePerGram = pricePerOunce / 31.1035;

    return pricePerGram;
  } catch (err) {
    console.error("Price fetch failed:", err);
    return null;
  }
}

// -------- SAVE DAILY HISTORY --------
function saveHistory(gramPrice) {
  const today = new Date().toISOString().slice(0, 10);

  let history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

  // Avoid duplicate entry for same day
  if (!history.find(h => h.date === today)) {
    history.unshift({
      date: today,
      gram: gramPrice,
      damlung: gramPrice * DAMLUNG_GRAMS
    });
  }

  // Keep only last 30 days
  history = history.slice(0, 30);

  localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
  return history;
}

// -------- DISPLAY HISTORY TABLE --------
function renderHistory(history) {
  const tbody = document.querySelector("#historyTable tbody");
  tbody.innerHTML = "";

  history.forEach(item => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${item.date}</td>
      <td>$${item.gram.toFixed(2)}</td>
      <td>$${item.damlung.toFixed(2)}</td>
    `;

    tbody.appendChild(tr);
  });
}

// -------- MAIN --------
(async () => {
  const gramPrice = await fetchGoldPrice();

  if (!gramPrice) {
    document.getElementById("gramPrice").innerText = "Error";
    document.getElementById("damlungPrice").innerText = "Error";
    return;
  }

  const damlungPrice = gramPrice * DAMLUNG_GRAMS;

  document.getElementById("gramPrice").innerText =
    "$" + gramPrice.toFixed(2);

  document.getElementById("damlungPrice").innerText =
    "$" + damlungPrice.toFixed(2);

  const history = saveHistory(gramPrice);
  renderHistory(history);
})();
</script>

</body>
</html>
