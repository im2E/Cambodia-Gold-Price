<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Price - Cambodian Damlung</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .container {
        background: white;
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 500px;
        width: 100%;
    }

    h1 {
        color: #333;
        text-align: center;
        margin-bottom: 30px;
        font-size: 28px;
    }

    .gold-icon {
        text-align: center;
        font-size: 60px;
        margin-bottom: 20px;
    }

    .price-card {
        background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
        border-radius: 15px;
        padding: 25px;
        margin-bottom: 20px;
        text-align: center;
    }

    .price-label {
        color: #333;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 10px;
        letter-spacing: 1px;
    }

    .price-value {
        color: #fff;
        font-size: 36px;
        font-weight: bold;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
    }

    .info-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin-top: 20px;
    }

    .info-box {
        background: #f8f9fa;
        border-radius: 10px;
        padding: 15px;
        text-align: center;
    }

    .info-label {
        color: #666;
        font-size: 12px;
        margin-bottom: 5px;
    }

    .info-value {
        color: #333;
        font-size: 18px;
        font-weight: bold;
    }

    .loading {
        text-align: center;
        color: #666;
        font-style: italic;
    }

    .error {
        background: #fee;
        color: #c33;
        padding: 15px;
        border-radius: 10px;
        text-align: center;
    }

    .refresh-btn {
        width: 100%;
        padding: 12px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 20px;
        transition: background 0.3s;
    }

    .refresh-btn:hover {
        background: #5568d3;
    }

    .timestamp {
        text-align: center;
        color: #999;
        font-size: 12px;
        margin-top: 15px;
    }
</style>

</head>
<body>
    <div class="container">
        <div class="gold-icon">🏆</div>
        <h1>Cambodian Gold Price Calculator</h1>
        <div id="content">
            <p class="loading">Loading gold prices...</p>
        </div>
    </div>

<script>
    async function fetchGoldPrice() {
        const contentDiv = document.getElementById('content');
        
        try {
            const response = await fetch('https://api.gold-api.com/price/XAU');
            
            if (!response.ok) {
                throw new Error('Failed to fetch gold price');
            }
            
            const data = await response.json();
            const pricePerOunce = data.price;
            
            // Convert ounce to gram (1 ounce = 31.1035 grams)
            const pricePerGram = pricePerOunce / 31.1035;
            
            // Calculate price for 1 damlung (37.5 grams)
            const pricePerDamlung = pricePerGram * 37.5;

            // Calculate price for 1 chi (3.75 grams)
            const pricePerChi = pricePerGram * 3.75;
            
            // Display the results
            contentDiv.innerHTML = `
                <div class="price-card">
                    <div class="price-label">1 DAMLUNG (37.5g)</div>
                    <div class="price-value">$${pricePerDamlung.toFixed(2)}</div>
                </div>
                
                <div class="info-grid">
                    <div class="info-box">
                        <div class="info-label">Per Ounce</div>
                        <div class="info-value">$${pricePerOunce.toFixed(2)}</div>
                    </div>
                    <div class="info-box">
                        <div class="info-label">Per Gram</div>
                        <div class="info-value">$${pricePerGram.toFixed(2)}</div>
                    </div>
                </div>

                <div class="info-grid">
                    <div class="info-box">
                        <div class="info-label">Per Chi</div>
                        <div class="info-value">$${pricePerChi.toFixed(2)}</div>
                    </div>
                    <div class="info-box">
                        <div class="info-label">Cambodia</div>
                        <div class="gold-icon">🇰🇭</div>
                    </div>
                </div>
                
                <button class="refresh-btn" onclick="fetchGoldPrice()">🔄 Refresh Price</button>
                
                <div class="timestamp">Last updated: ${new Date().toLocaleString()}</div>
            `;
            
        } catch (error) {
            contentDiv.innerHTML = `
                <div class="error">
                    ⚠️ Error fetching gold price: ${error.message}
                    <br><br>
                    Please check your internet connection or try again later.
                </div>
                <button class="refresh-btn" onclick="fetchGoldPrice()">🔄 Try Again</button>
            `;
        }
    }
    
    // Fetch price on page load
    fetchGoldPrice();
</script>

</body>
</html>
